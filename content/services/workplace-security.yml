details:
  title: How We Protect Your Workplace
  description: Our approach combines intelligence, experience, and discretion.
  paragraphs:
    - Every workplace has unique vulnerabilities. We begin with a detailed on-site assessment and stakeholder interviews to understand your environment.
    - Our team works alongside leadership, HR, and security personnel to develop policies that de-escalate situations before they become incidents.
    - From active threat training to ongoing advisory support, we ensure your security posture evolves with your organization.
